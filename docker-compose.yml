services:
  postgres:
    image: postgres:16-alpine
    container_name: gymconnect_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gymconnect_ai}
      POSTGRES_USER: ${DB_USER:-gymconnect_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gymconnect_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./app/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gymconnect_user} -d ${DB_NAME:-gymconnect_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
